name: Publish Package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      package-version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6 # v4.0.4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      # This package has no required dependency lifecycle scripts. Keep install
      # unprivileged and prevent a dependency from executing during installation.
      - run: npm ci --ignore-scripts
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test

      - id: version
        name: Validate tag and package metadata
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          test "${GITHUB_REF_NAME}" = "v${tag_version}"
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          const tag = process.env.GITHUB_REF_NAME.slice(1);
          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const lock = JSON.parse(fs.readFileSync("package-lock.json", "utf8"));
          if (!tag || pkg.version !== tag || lock.packages?.[""]?.version !== tag) {
            throw new Error("Release tag, package.json, and package-lock.json versions must match");
          }
          console.log(`Validated release version ${tag}`);
          NODE
          echo "version=${tag_version}" >> "$GITHUB_OUTPUT"

      - name: Inspect approved publication contents
        run: |
          set -euo pipefail
          npm pack --dry-run --json > pack-dry-run.json
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          const [{ files }] = JSON.parse(fs.readFileSync("pack-dry-run.json", "utf8"));
          const allowed = /^(extension\/.+|README\.md|package\.json)$/;
          const unexpected = files.map(({ path }) => path).filter((path) => !allowed.test(path));
          if (unexpected.length) throw new Error(`Unexpected package files: ${unexpected.join(", ")}`);
          NODE

      - name: Pack validated artifact
        run: |
          set -euo pipefail
          npm pack --json > pack.json
          tarball="$(node -e 'console.log(JSON.parse(require("fs").readFileSync("pack.json", "utf8"))[0].filename)')"
          mv "$tarball" package.tgz

      - uses: actions/upload-artifact@0b2256b8c012f0828dc542b3febcab082c67f72b # v4.3.4
        with:
          name: release-package
          path: package.tgz
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: build-and-validate
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-package
          path: .

      - name: Verify received package artifact
        run: |
          set -euo pipefail
          test -f package.tgz
          tar -tzf package.tgz

      - run: npm publish ./package.tgz --provenance --access public
